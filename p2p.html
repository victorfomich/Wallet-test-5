<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>P2P - DreamWallet</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="p2p-styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="user-manager.js"></script>
</head>
<body>
    <div class="container">
        <div class="p2p-page">
            <div class="p2p-header">
                <button class="p2p-back-btn" id="backBtn" aria-label="Назад">‹</button>
                <h1 class="p2p-page-title">P2P</h1>
            </div>

            <div class="p2p-min-banner" id="p2pMinBanner">Минимальная сумма сделки: $300</div>

            <div class="p2p-tabs">
                <button class="p2p-tab active" data-type="sell">Купить USDT</button>
                <button class="p2p-tab" data-type="buy">Продать USDT</button>
            </div>

            <div class="p2p-list" id="p2pList">
                <div class="p2p-loading">Загрузка предложений...</div>
            </div>
        </div>
    </div>

    <div class="p2p-overlay" id="p2pOverlay">
        <div class="p2p-sheet">
            <h2 id="p2pSheetTitle">Мерчант</h2>
            <div class="p2p-sheet-row"><span>Тип</span><span id="p2pSheetType">—</span></div>
            <div class="p2p-sheet-row"><span>Цена</span><span id="p2pSheetPrice">—</span></div>
            <div class="p2p-sheet-row"><span>Лимиты</span><span id="p2pSheetLimits">—</span></div>
            <div class="p2p-sheet-row"><span>Сделок</span><span id="p2pSheetDeals">—</span></div>
            <div class="p2p-sheet-row"><span>Оплата</span><span id="p2pSheetPayments">—</span></div>
            <div class="p2p-sheet-row"><span>Завершено</span><span id="p2pSheetCompletion">—</span></div>
            <div class="p2p-sheet-row"><span>Ответ</span><span id="p2pSheetResponse">—</span></div>
            <p class="p2p-sheet-note" id="p2pSheetNote"></p>
            <div class="p2p-sheet-actions">
                <button class="p2p-sheet-btn secondary" id="p2pSheetClose">Закрыть</button>
                <button class="p2p-sheet-btn primary" id="p2pStartDealBtn">Начать сделку</button>
            </div>
        </div>
    </div>

    <script src="p2p-script.js"></script>
</body>
</html>
